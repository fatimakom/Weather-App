<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Today</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky:    #0b0f1a;
      --panel:  rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.09);
      --gold:   #f0c060;
      --ice:    #8ecfff;
      --mist:   #b0bec5;
      --white:  #f0f4ff;
    }

    body {
      min-height: 100vh;
      background: var(--sky);
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem 5rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(100,160,255,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(240,192,96,0.06) 0%, transparent 70%);
      pointer-events: none;
      animation: breathe 8s ease-in-out infinite alternate;
    }
    @keyframes breathe {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }

    /* ── Weather Scene ── */
    .weather-scene {
      position: relative;
      width: 220px;
      height: 120px;
      margin-bottom: 1.5rem;
    }

    /* SUN */
    .sun {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 60px;
      background: radial-gradient(circle, #ffe066, #f0c060);
      border-radius: 50%;
      box-shadow: 0 0 30px 10px rgba(240,192,60,0.3);
      animation: sunPulse 3s ease-in-out infinite;
      display: none;
    }
    /* sun rays */
    .sun::before {
      content: '';
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      background: repeating-conic-gradient(
        rgba(255,220,80,0.25) 0deg 20deg,
        transparent 20deg 40deg
      );
      animation: sunRotate 8s linear infinite;
    }
    @keyframes sunPulse {
      0%,100% { box-shadow: 0 0 30px 10px rgba(240,192,60,0.3); }
      50%      { box-shadow: 0 0 50px 20px rgba(240,192,60,0.5); }
    }
    @keyframes sunRotate { to { transform: rotate(360deg); } }

    /* CLOUD */
    .cloud {
      position: absolute;
      background: #c8d8e8;
      border-radius: 50px;
      display: none;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: #c8d8e8;
      border-radius: 50%;
    }
    .cloud-main {
      width: 90px; height: 30px;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      animation: cloudFloat 4s ease-in-out infinite;
    }
    .cloud-main::before {
      width: 40px; height: 40px;
      top: -20px; left: 12px;
    }
    .cloud-main::after {
      width: 28px; height: 28px;
      top: -12px; left: 42px;
    }
    .cloud-small {
      width: 60px; height: 20px;
      top: 35px; left: 20%;
      background: #a0b8cc;
      opacity: 0.6;
      animation: cloudFloat 5s ease-in-out infinite reverse;
    }
    .cloud-small::before {
      width: 26px; height: 26px;
      top: -14px; left: 8px;
      background: #a0b8cc;
    }
    .cloud-small::after {
      width: 18px; height: 18px;
      top: -8px; left: 28px;
      background: #a0b8cc;
    }
    @keyframes cloudFloat {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(-6px); }
    }

    /* RAIN DROPS */
    .rain-container {
      position: absolute;
      top: 55px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 60px;
      display: none;
    }
    .drop {
      position: absolute;
      width: 3px;
      border-radius: 3px;
      background: linear-gradient(to bottom, transparent, var(--ice));
      animation: fall linear infinite;
    }
    .drop:nth-child(1) { height: 14px; left: 10px; animation-duration: 0.8s; animation-delay: 0s; }
    .drop:nth-child(2) { height: 18px; left: 25px; animation-duration: 0.9s; animation-delay: 0.2s; }
    .drop:nth-child(3) { height: 12px; left: 40px; animation-duration: 0.7s; animation-delay: 0.1s; }
    .drop:nth-child(4) { height: 16px; left: 55px; animation-duration: 1.0s; animation-delay: 0.3s; }
    .drop:nth-child(5) { height: 14px; left: 70px; animation-duration: 0.85s; animation-delay: 0.15s; }
    @keyframes fall {
      from { transform: translateY(-10px); opacity: 1; }
      to   { transform: translateY(55px);  opacity: 0; }
    }

    /* SNOW */
    .snow-container {
      position: absolute;
      top: 55px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 60px;
      display: none;
    }
    .snowflake {
      position: absolute;
      color: #e0f0ff;
      font-size: 14px;
      animation: snowFall linear infinite;
    }
    .snowflake:nth-child(1) { left: 5px;  animation-duration: 2s;   animation-delay: 0s; }
    .snowflake:nth-child(2) { left: 25px; animation-duration: 2.5s; animation-delay: 0.5s; }
    .snowflake:nth-child(3) { left: 45px; animation-duration: 1.8s; animation-delay: 0.2s; }
    .snowflake:nth-child(4) { left: 65px; animation-duration: 2.2s; animation-delay: 0.8s; }
    @keyframes snowFall {
      from { transform: translateY(-10px) rotate(0deg);   opacity: 1; }
      to   { transform: translateY(60px)  rotate(180deg); opacity: 0; }
    }

    /* STORM (lightning) */
    .lightning {
      position: absolute;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.5rem;
      display: none;
      animation: flash 1.5s ease-in-out infinite;
    }
    @keyframes flash {
      0%,90%,100% { opacity: 1; }
      95%          { opacity: 0.1; }
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeDown 0.7s ease both;
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--white) 30%, var(--ice));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p {
      margin-top: 0.5rem;
      font-size: 0.95rem;
      color: var(--mist);
      font-weight: 300;
    }

    .search-wrap {
      display: flex;
      gap: 0.6rem;
      width: 100%;
      max-width: 500px;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.7s 0.15s ease both;
    }
    .search-wrap input {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input::placeholder { color: var(--mist); }
    .search-wrap input:focus { border-color: var(--ice); }
    .search-wrap button {
      background: var(--ice);
      color: #0b0f1a;
      border: none;
      border-radius: 12px;
      padding: 0.85rem 1.4rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }
    .search-wrap button:hover { opacity: 0.85; transform: translateY(-1px); }
    .search-wrap button:active { transform: translateY(0); }

    #card {
      width: 100%;
      max-width: 500px;
      display: none;
      flex-direction: column;
      gap: 1rem;
      animation: rise 0.5s ease both;
    }
    @keyframes rise {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }
    #card.visible { display: flex; }

    .glass {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.6rem;
      backdrop-filter: blur(12px);
    }

    .city-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .city-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1.1;
    }
    .country-tag {
      font-size: 0.75rem;
      color: var(--mist);
      margin-top: 0.3rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .temp-big {
      font-family: 'Syne', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      color: var(--gold);
      line-height: 1;
    }
    .condition {
      margin-top: 0.8rem;
      font-size: 1rem;
      color: var(--ice);
      font-style: italic;
      font-weight: 300;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }
    .stat {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
    }
    .stat-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--mist);
      margin-bottom: 0.4rem;
    }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
    }

    .tip-box .tip-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold);
      margin-bottom: 0.7rem;
    }
    .tip-text {
      font-size: 0.97rem;
      line-height: 1.7;
      color: #d0dce8;
      font-weight: 300;
    }

    #loader {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
      color: var(--mist);
      font-size: 0.9rem;
    }
    #loader.visible { display: flex; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--ice);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      display: none;
      color: #ff8080;
      font-size: 0.9rem;
      text-align: center;
      margin-top: 0.5rem;
    }
    #error.visible { display: block; }
  </style>
</head>
<body>

<header>
  <h1>Weather Today</h1>
  <p>Real-time weather · powered by OpenWeatherMap</p>
</header>

<!-- ── Animated Weather Scene ── -->
<div class="weather-scene">

  <!-- Sun (shown on clear/sunny weather) -->
  <div class="sun" id="sunEl"></div>

  <!-- Clouds (shown on cloudy weather) -->
  <div class="cloud cloud-main" id="cloudMain"></div>
  <div class="cloud cloud-small" id="cloudSmall"></div>

  <!-- Rain drops (shown on rainy weather) -->
  <div class="rain-container" id="rainEl">
    <div class="drop"></div>
    <div class="drop"></div>
    <div class="drop"></div>
    <div class="drop"></div>
    <div class="drop"></div>
  </div>

  <!-- Snow (shown on snowy weather) -->
  <div class="snow-container" id="snowEl">
    <div class="snowflake">❄</div>
    <div class="snowflake">❄</div>
    <div class="snowflake">❄</div>
    <div class="snowflake">❄</div>
  </div>

  <!-- Storm / Lightning -->
  <div class="lightning" id="lightningEl">⚡</div>

</div>

<div class="search-wrap">
  <input id="cityInput" type="text" placeholder="Enter city name…" />
  <button onclick="fetchWeather()">Search</button>
</div>

<div id="loader">
  <div class="spinner"></div>
  <span>Fetching weather…</span>
</div>

<p id="error"></p>

<div id="card">
  <div class="glass">
    <div class="city-row">
      <div>
        <div class="city-name" id="cityName">—</div>
        <div class="country-tag" id="countryTag">—</div>
      </div>
      <div class="temp-big" id="tempBig">—</div>
    </div>
    <div class="condition" id="condition">—</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Feels Like</div>
      <div class="stat-value" id="feelsLike">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Humidity</div>
      <div class="stat-value" id="humidity">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Wind Speed</div>
      <div class="stat-value" id="windSpeed">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Visibility</div>
      <div class="stat-value" id="visibility">—</div>
    </div>
  </div>

  <div class="glass tip-box">
    <div class="tip-label">💡 Daily Tip</div>
    <div class="tip-text" id="tipText">—</div>
  </div>
</div>

<script>
  const OPENWEATHER_KEY = "OPENWEATHER_KEY_API"; // 🔑 Replace with your key

  const input  = document.getElementById("cityInput");
  const card   = document.getElementById("card");
  const loader = document.getElementById("loader");
  const errEl  = document.getElementById("error");

  input.addEventListener("keydown", e => { if (e.key === "Enter") fetchWeather(); });

  // ── Show the right weather character ──────────────────────────────────────
  function showScene(description) {
    // Hide all first
    document.getElementById("sunEl").style.display        = "none";
    document.getElementById("cloudMain").style.display    = "none";
    document.getElementById("cloudSmall").style.display   = "none";
    document.getElementById("rainEl").style.display       = "none";
    document.getElementById("snowEl").style.display       = "none";
    document.getElementById("lightningEl").style.display  = "none";

    const d = description.toLowerCase();

    if (d.includes("thunder") || d.includes("storm")) {
      // Storm → clouds + lightning
      document.getElementById("cloudMain").style.display   = "block";
      document.getElementById("cloudSmall").style.display  = "block";
      document.getElementById("lightningEl").style.display = "block";

    } else if (d.includes("snow") || d.includes("sleet") || d.includes("blizzard")) {
      // Snow → clouds + snowflakes
      document.getElementById("cloudMain").style.display  = "block";
      document.getElementById("snowEl").style.display     = "flex";

    } else if (d.includes("rain") || d.includes("drizzle") || d.includes("shower")) {
      // Rain → clouds + raindrops
      document.getElementById("cloudMain").style.display  = "block";
      document.getElementById("cloudSmall").style.display = "block";
      document.getElementById("rainEl").style.display     = "flex";

    } else if (d.includes("cloud") || d.includes("overcast") || d.includes("mist") || d.includes("fog")) {
      // Cloudy → just clouds
      document.getElementById("cloudMain").style.display  = "block";
      document.getElementById("cloudSmall").style.display = "block";

    } else {
      // Clear / sunny → sun
      document.getElementById("sunEl").style.display = "block";
    }
  }

  // ── Smart tip logic ───────────────────────────────────────────────────────
  function getTip(temp, description, windSpeed) {
    let tip = "";

    if      (temp >= 35) tip = "It's very hot! Stay hydrated and avoid direct sunlight.";
    else if (temp >= 25) tip = "Warm and pleasant — light clothes are perfect today.";
    else if (temp >= 15) tip = "Mild weather. A light jacket might come in handy.";
    else if (temp >= 5)  tip = "It's cold outside. Wear a coat and stay warm.";
    else                 tip = "Freezing! Bundle up with heavy layers.";

    if (["rain","drizzle","shower","storm"].some(w => description.includes(w)))
      tip += " Don't forget your umbrella!";

    if (windSpeed > 10)
      tip += " It's quite windy out there!";

    return tip;
  }

  // ── Fetch weather ─────────────────────────────────────────────────────────
  async function fetchWeather() {
    const city = input.value.trim();
    if (!city) return;

    errEl.classList.remove("visible");
    card.classList.remove("visible");
    loader.classList.add("visible");

    try {
      const res = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${OPENWEATHER_KEY}&units=metric`
      );
      if (res.status === 404) throw new Error(`City "${city}" not found.`);
      if (!res.ok) throw new Error("Weather API error. Check your API key.");

      const w = await res.json();
      const description = w.weather[0].description;

      document.getElementById("cityName").textContent   = w.name;
      document.getElementById("countryTag").textContent = w.sys.country;
      document.getElementById("tempBig").textContent    = Math.round(w.main.temp) + "°C";
      document.getElementById("condition").textContent  = capitalize(description);
      document.getElementById("feelsLike").textContent  = Math.round(w.main.feels_like) + "°C";
      document.getElementById("humidity").textContent   = w.main.humidity + "%";
      document.getElementById("windSpeed").textContent  = w.wind.speed + " m/s";
      document.getElementById("visibility").textContent = w.visibility ? (w.visibility / 1000).toFixed(1) + " km" : "N/A";
      document.getElementById("tipText").textContent    = getTip(w.main.temp, description, w.wind.speed);

      // Show matching weather animation
      showScene(description);

      card.classList.add("visible");

    } catch (err) {
      errEl.textContent = "❌ " + err.message;
      errEl.classList.add("visible");
    } finally {
      loader.classList.remove("visible");
    }
  }

  function capitalize(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
  }
</script>
</body>
</html>
